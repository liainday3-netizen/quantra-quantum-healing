<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUANTRA V2 — Quantum Healing Technology</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root{
  /* Core palette */
  --void:#00060f;--deep:#020b18;--cosmic:#071423;
  --teal:#00f5d4;--violet:#9b5de5;--gold:#f7c59f;
  --rose:#f15bb5;--blue:#00bbf9;--lime:#a8ff78;--amber:#ffb703;
  --white:#ecf4ff;
  /* Claude Edition */
  --cc:#c17f3e;--ca:#e8a84a;--cd:#140a02;
  /* V2 new */
  --electric:#4cc9f0;--neon:#7209b7;--plasma:#f72585;
  --glass:rgba(2,11,24,.8);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--void);color:var(--white);font-family:'Cormorant Garamond',serif;overflow-x:hidden;cursor:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--void)}::-webkit-scrollbar-thumb{background:rgba(0,245,212,.3);border-radius:3px}

/* ── CURSOR ── */
#cr{position:fixed;top:0;left:0;width:32px;height:32px;border:1px solid var(--teal);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:transform .1s}
#cd{position:fixed;top:0;left:0;width:4px;height:4px;background:var(--teal);border-radius:50%;pointer-events:none;z-index:10000;transform:translate(-50%,-50%);mix-blend-mode:screen}
.pt{position:fixed;pointer-events:none;z-index:9998;border-radius:50%;animation:ptF .8s ease forwards}
@keyframes ptF{from{opacity:.6;transform:scale(1) translate(-50%,-50%)}to{opacity:0;transform:scale(0) translate(-50%,-50%)}}
#nebula{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── PAGES ── */
.page{display:none;animation:pgIn .5s ease}
.page.active{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── NAV ── */
.nav{position:fixed;top:0;inset-inline:0;z-index:800;padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,6,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,245,212,.07)}
.nav-logo{font-family:'Cinzel Decorative',serif;font-size:1.05rem;letter-spacing:4px;cursor:pointer;position:relative}
.nav-logo-text{background:linear-gradient(90deg,var(--teal),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-logo-v2{font-family:'Space Mono',monospace;font-size:.55rem;color:var(--teal);letter-spacing:2px;vertical-align:super;margin-left:4px;opacity:.7}
.nav-sub{font-family:'Rajdhani',sans-serif;font-size:.6rem;letter-spacing:4px;color:rgba(232,244,255,.22);display:block;margin-top:-2px}
.nav-center{display:flex;gap:28px}
.nav-center a{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(232,244,255,.35);text-decoration:none;text-transform:uppercase;transition:color .25s;cursor:pointer}
.nav-center a:hover{color:var(--teal)}
.nav-right{display:flex;gap:10px;align-items:center}
.nb{padding:7px 18px;font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;border-radius:50px;cursor:pointer;transition:all .3s;border:none}
.nb-g{background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(232,244,255,.4)}
.nb-g:hover{border-color:rgba(255,255,255,.22);color:var(--white)}
.nb-p{background:linear-gradient(135deg,rgba(0,245,212,.18),rgba(155,93,229,.18));border:1px solid rgba(0,245,212,.32);color:var(--teal)}
.nb-p:hover{box-shadow:0 0 24px rgba(0,245,212,.18);transform:translateY(-1px)}
.nb-c{background:linear-gradient(135deg,rgba(193,127,62,.22),rgba(232,168,74,.12));border:1px solid rgba(193,127,62,.4);color:var(--ca)}
.nb-c:hover{box-shadow:0 0 24px rgba(193,127,62,.18)}
.nb-app{display:none}

/* V2 badge */
.v2-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;background:rgba(76,201,240,.1);border:1px solid rgba(76,201,240,.25);border-radius:50px;font-family:'Space Mono',monospace;font-size:.6rem;color:var(--electric);letter-spacing:1px}

/* ═══════════════════════
   LANDING V2
═══════════════════════ */
.land{position:relative;z-index:2}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 24px 80px;text-align:center;position:relative;overflow:hidden}
.hero-mesh{position:absolute;inset:0;background:
  radial-gradient(ellipse 100% 80% at 50% -10%,rgba(0,245,212,.06) 0,transparent 60%),
  radial-gradient(ellipse 60% 70% at 10% 90%,rgba(155,93,229,.08) 0,transparent 55%),
  radial-gradient(ellipse 40% 40% at 90% 70%,rgba(76,201,240,.05) 0,transparent 55%),
  radial-gradient(ellipse 50% 30% at 50% 100%,rgba(247,37,133,.04) 0,transparent 50%);
  animation:mPulse 16s ease-in-out infinite alternate}
@keyframes mPulse{from{opacity:.7}to{opacity:1;transform:scale(1.03)}}

.hero-tag{display:inline-flex;align-items:center;gap:10px
