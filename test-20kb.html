<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUANTRA V2 — Quantum Healing Technology</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root{
  /* Core palette */
  --void:#00060f;--deep:#020b18;--cosmic:#071423;
  --teal:#00f5d4;--violet:#9b5de5;--gold:#f7c59f;
  --rose:#f15bb5;--blue:#00bbf9;--lime:#a8ff78;--amber:#ffb703;
  --white:#ecf4ff;
  /* Claude Edition */
  --cc:#c17f3e;--ca:#e8a84a;--cd:#140a02;
  /* V2 new */
  --electric:#4cc9f0;--neon:#7209b7;--plasma:#f72585;
  --glass:rgba(2,11,24,.8);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--void);color:var(--white);font-family:'Cormorant Garamond',serif;overflow-x:hidden;cursor:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--void)}::-webkit-scrollbar-thumb{background:rgba(0,245,212,.3);border-radius:3px}

/* ── CURSOR ── */
#cr{position:fixed;top:0;left:0;width:32px;height:32px;border:1px solid var(--teal);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:transform .1s}
#cd{position:fixed;top:0;left:0;width:4px;height:4px;background:var(--teal);border-radius:50%;pointer-events:none;z-index:10000;transform:translate(-50%,-50%);mix-blend-mode:screen}
.pt{position:fixed;pointer-events:none;z-index:9998;border-radius:50%;animation:ptF .8s ease forwards}
@keyframes ptF{from{opacity:.6;transform:scale(1) translate(-50%,-50%)}to{opacity:0;transform:scale(0) translate(-50%,-50%)}}
#nebula{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── PAGES ── */
.page{display:none;animation:pgIn .5s ease}
.page.active{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── NAV ── */
.nav{position:fixed;top:0;inset-inline:0;z-index:800;padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,6,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,245,212,.07)}
.nav-logo{font-family:'Cinzel Decorative',serif;font-size:1.05rem;letter-spacing:4px;cursor:pointer;position:relative}
.nav-logo-text{background:linear-gradient(90deg,var(--teal),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-logo-v2{font-family:'Space Mono',monospace;font-size:.55rem;color:var(--teal);letter-spacing:2px;vertical-align:super;margin-left:4px;opacity:.7}
.nav-sub{font-family:'Rajdhani',sans-serif;font-size:.6rem;letter-spacing:4px;color:rgba(232,244,255,.22);display:block;margin-top:-2px}
.nav-center{display:flex;gap:28px}
.nav-center a{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(232,244,255,.35);text-decoration:none;text-transform:uppercase;transition:color .25s;cursor:pointer}
.nav-center a:hover{color:var(--teal)}
.nav-right{display:flex;gap:10px;align-items:center}
.nb{padding:7px 18px;font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;border-radius:50px;cursor:pointer;transition:all .3s;border:none}
.nb-g{background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(232,244,255,.4)}
.nb-g:hover{border-color:rgba(255,255,255,.22);color:var(--white)}
.nb-p{background:linear-gradient(135deg,rgba(0,245,212,.18),rgba(155,93,229,.18));border:1px solid rgba(0,245,212,.32);color:var(--teal)}
.nb-p:hover{box-shadow:0 0 24px rgba(0,245,212,.18);transform:translateY(-1px)}
.nb-c{background:linear-gradient(135deg,rgba(193,127,62,.22),rgba(232,168,74,.12));border:1px solid rgba(193,127,62,.4);color:var(--ca)}
.nb-c:hover{box-shadow:0 0 24px rgba(193,127,62,.18)}
.nb-app{display:none}

/* V2 badge */
.v2-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;background:rgba(76,201,240,.1);border:1px solid rgba(76,201,240,.25);border-radius:50px;font-family:'Space Mono',monospace;font-size:.6rem;color:var(--electric);letter-spacing:1px}

/* ═══════════════════════
   LANDING V2
═══════════════════════ */
.land{position:relative;z-index:2}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 24px 80px;text-align:center;position:relative;overflow:hidden}
.hero-mesh{position:absolute;inset:0;background:
  radial-gradient(ellipse 100% 80% at 50% -10%,rgba(0,245,212,.06) 0,transparent 60%),
  radial-gradient(ellipse 60% 70% at 10% 90%,rgba(155,93,229,.08) 0,transparent 55%),
  radial-gradient(ellipse 40% 40% at 90% 70%,rgba(76,201,240,.05) 0,transparent 55%),
  radial-gradient(ellipse 50% 30% at 50% 100%,rgba(247,37,133,.04) 0,transparent 50%);
  animation:mPulse 16s ease-in-out infinite alternate}
@keyframes mPulse{from{opacity:.7}to{opacity:1;transform:scale(1.03)}}

.hero-tag{display:inline-flex;align-items:center;gap:10px;padding:8px 22px;background:rgba(0,245,212,.06);border:1px solid rgba(0,245,212,.18);border-radius:50px;font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:5px;color:var(--teal);text-transform:uppercase;margin-bottom:32px;opacity:0;animation:fUp 1s ease .3s forwards}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal);animation:hDot 2.2s ease-in-out infinite}
@keyframes hDot{0%,100%{opacity:.25}50%{opacity:1}}

/* CANVAS HERO */
.hero-canvas-wrap{position:relative;width:360px;height:360px;margin:0 auto 32px;opacity:0;animation:fUp 1.2s ease .3s forwards}
#heroC{position:absolute;inset:0}
.hero-orb-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.h-orb{width:72px;height:72px;border-radius:50%;border:1px solid rgba(0,245,212,.5);box-shadow:0 0 50px var(--teal),inset 0 0 24px rgba(0,245,212,.15);display:flex;align-items:center;justify-content:center;font-size:1.6rem;animation:orbP 5.5s ease-in-out infinite}
@keyframes orbP{0%,100%{box-shadow:0 0 40px var(--teal),inset 0 0 18px rgba(0,245,212,.1)}50%{box-shadow:0 0 80px var(--teal),0 0 140px rgba(0,245,212,.14),inset 0 0 36px rgba(0,245,212,.2);transform:scale(1.2)}}

.hero-eyebrow{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:3px;color:rgba(0,245,212,.5);margin-bottom:12px;opacity:0;animation:fUp 1s ease .5s forwards}
.hero-h1{font-family:'Cinzel Decorative',serif;font-size:clamp(3.2rem,8vw,7rem);font-weight:900;line-height:.95;background:linear-gradient(150deg,var(--teal) 0,var(--white) 28%,var(--violet) 60%,var(--plasma) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 70px rgba(0,245,212,.28));opacity:0;animation:fUp 1.3s ease .7s forwards;margin-bottom:14px}
.hero-v2tag{display:inline-block;padding:4px 14px;background:rgba(76,201,240,.1);border:1px solid rgba(76,201,240,.22);border-radius:4px;font-family:'Space Mono',monospace;font-size:.65rem;color:var(--electric);letter-spacing:2px;margin-bottom:18px;opacity:0;animation:fUp 1s ease .9s forwards}
.hero-desc{font-size:1.25rem;font-style:italic;font-weight:300;color:rgba(232,244,255,.48);max-width:580px;margin:0 auto 48px;line-height:1.85;opacity:0;animation:fUp 1s ease 1.1s forwards}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;opacity:0;animation:fUp 1s ease 1.2s forwards;margin-bottom:56px}
.hb-main{padding:15px 44px;background:linear-gradient(135deg,rgba(0,245,212,.18),rgba(155,93,229,.18));border:1px solid rgba(0,245,212,.42);border-radius:50px;color:var(--teal);font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:5px;text-transform:uppercase;cursor:pointer;transition:all .4s;position:relative;overflow:hidden}
.hb-main:hover{box-shadow:0 0 60px rgba(0,245,212,.25),0 0 120px rgba(0,245,212,.07);transform:translateY(-3px)}
.hb-cl{padding:15px 38px;background:linear-gradient(135deg,rgba(193,127,62,.22),rgba(232,168,74,.12));border:1px solid rgba(193,127,62,.42);border-radius:50px;color:var(--ca);font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:5px;text-transform:uppercase;cursor:pointer;transition:all .4s}
.hb-cl:hover{box-shadow:0 0 50px rgba(193,127,62,.22);transform:translateY(-3px)}
.hb-gh{padding:15px 36px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:50px;color:rgba(232,244,255,.4);font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:5px;text-transform:uppercase;cursor:pointer;transition:all .3s}
.hb-gh:hover{border-color:rgba(255,255,255,.22);color:var(--white)}

/* STATS TICKER */
.stats-ticker{display:flex;gap:48px;justify-content:center;flex-wrap:wrap;opacity:0;animation:fUp 1s ease 1.4s forwards;padding:0 20px}
.st-item{text-align:center}
.st-n{font-family:'Space Mono',monospace;font-size:1.8rem;background:linear-gradient(90deg,var(--teal),var(--electric));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.st-l{font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:4px;color:rgba(232,244,255,.28);text-transform:uppercase;margin-top:3px}

@keyframes fUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* SECTION BASE */
.sec{position:relative;z-index:2;padding:120px 40px}
.sec-ey{font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:6px;color:var(--violet);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px;justify-content:center}
.sec-ey::before,.sec-ey::after{content:'';flex:1;max-width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(155,93,229,.3))}
.sec-h{font-family:'Cinzel Decorative',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);text-align:center;margin-bottom:16px}
.sec-s{font-size:1.05rem;font-style:italic;color:rgba(232,244,255,.48);max-width:540px;margin:0 auto 64px;line-height:1.9;text-align:center}

/* FEATURE BENTO GRID */
.bento{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto;gap:16px;max-width:1100px;margin:0 auto}
.bento-card{background:rgba(2,11,24,.7);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:32px 26px;transition:all .4s;backdrop-filter:blur(8px);position:relative;overflow:hidden;cursor:pointer}
.bento-card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top left,var(--bg,rgba(0,245,212,.06)),transparent 65%);opacity:0;transition:opacity .4s}
.bento-card:hover::after{opacity:1}
.bento-card:hover{transform:translateY(-5px);border-color:var(--bc,rgba(0,245,212,.2));box-shadow:0 18px 55px var(--bs,rgba(0,245,212,.06))}
.bento-card.wide{grid-column:span 2}
.bento-card.tall{grid-row:span 2}
.bento-icon{font-size:2rem;margin-bottom:14px;display:block;filter:drop-shadow(0 0 12px var(--ic,var(--teal)))}
.bento-title{font-family:'Cinzel Decorative',serif;font-size:.88rem;margin-bottom:8px}
.bento-text{font-size:.85rem;font-weight:300;font-style:italic;color:rgba(232,244,255,.45);line-height:1.75}
.bento-tag{display:inline-block;margin-top:14px;padding:3px 12px;border-radius:50px;font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:1px;border:1px solid var(--bc,rgba(0,245,212,.2));color:var(--ic,var(--teal))}
.bento-preview{margin-top:16px;height:80px;border-radius:12px;background:rgba(0,0,0,.3);overflow:hidden;display:flex;align-items:center;justify-content:center}
#bentoWave{border-radius:12px}

/* CHANGELOG */
.changelog-sec{background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(76,201,240,.03) 0,transparent 70%)}
.cl-grid{display:flex;flex-direction:column;gap:1px;max-width:700px;margin:0 auto;border-left:1px solid rgba(0,245,212,.15);padding-left:32px}
.cl-item{position:relative;padding:20px 0 28px}
.cl-item::before{content:'';position:absolute;left:-37px;top:26px;width:10px;height:10px;border-radius:50%;background:var(--dot-c,var(--teal));box-shadow:0 0 12px var(--dot-c,var(--teal))}
.cl-version{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--dot-c,var(--teal));letter-spacing:2px;margin-bottom:4px}
.cl-date{font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:4px;color:rgba(232,244,255,.25);text-transform:uppercase;margin-bottom:10px}
.cl-title{font-family:'Cinzel Decorative',serif;font-size:1rem;margin-bottom:8px}
.cl-text{font-size:.88rem;font-style:italic;color:rgba(232,244,255,.45);line-height:1.75}
.cl-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.cl-chip{padding:3px 10px;border-radius:50px;font-family:'Rajdhani',sans-serif;font-size:8px;letter-spacing:3px;text-transform:uppercase;border:1px solid rgba(255,255,255,.08);color:rgba(232,244,255,.3)}

/* PRICING V2 */
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;max-width:980px;margin:0 auto}
.p-card{border-radius:26px;padding:36px 30px;position:relative;overflow:hidden;transition:transform .4s;cursor:pointer}
.p-card:hover{transform:translateY(-7px)}
.p-card.p-free{background:rgba(2,11,24,.7);border:1px solid rgba(255,255,255,.07)}
.p-card.p-pro{background:rgba(7,20,35,.8);border:1px solid rgba(155,93,229,.28);box-shadow:0 0 60px rgba(155,93,229,.05)}
.p-card.p-claude{background:linear-gradient(140deg,rgba(20,10,2,.95),rgba(34,18,4,.95));border:1px solid rgba(193,127,62,.38);box-shadow:0 0 70px rgba(193,127,62,.07)}
.p-popular{position:absolute;top:18px;right:18px;padding:4px 12px;background:rgba(155,93,229,.2);border:1px solid rgba(155,93,229,.38);border-radius:50px;font-family:'Space Mono',monospace;font-size:.55rem;color:var(--violet);letter-spacing:1px}
.p-badge{display:inline-block;padding:4px 14px;border-radius:50px;font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;margin-bottom:20px}
.p-price{font-family:'Space Mono',monospace;font-size:2.8rem;font-weight:700;margin-bottom:4px}
.p-period{font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:rgba(232,244,255,.28);margin-bottom:22px}
.p-name{font-family:'Cinzel Decorative',serif;font-size:1.5rem;margin-bottom:10px}
.p-desc{font-size:.88rem;font-style:italic;color:rgba(232,244,255,.45);line-height:1.75;margin-bottom:22px}
.p-feats{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.p-feats li{display:flex;gap:10px;align-items:flex-start;font-size:.83rem;color:rgba(232,244,255,.55);font-style:italic}
.p-feats li span{flex-shrink:0;margin-top:1px}
.p-cta{width:100%;padding:13px;border-radius:50px;font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:all .4s;border:none}
.claude-seal-sm{position:absolute;bottom:18px;right:18px;width:44px;height:44px;border-radius:50%;border:1px solid rgba(193,127,62,.25);display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:rgba(193,127,62,.07)}

/* REFERRAL */
.referral-sec{background:radial-gradient(ellipse 70% 50% at 50% 50%,rgba(0,245,212,.04) 0,transparent 70%)}
.ref-card{max-width:680px;margin:0 auto;background:rgba(2,11,24,.8);border:1px solid rgba(0,245,212,.12);border-radius:28px;padding:48px;backdrop-filter:blur(12px);text-align:center}
.ref-icon{font-size:3rem;margin-bottom:20px;display:block;filter:drop-shadow(0 0 20px var(--teal))}
.ref-h{font-family:'Cinzel Decorative',serif;font-size:1.6rem;margin-bottom:12px}
.ref-desc{font-size:1rem;font-style:italic;color:rgba(232,244,255,.5);line-height:1.8;margin-bottom:32px}
.ref-tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.ref-tier{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:18px 14px;text-align:center}
.ref-tier-n{font-family:'Space Mono',monospace;font-size:1.6rem;background:linear-gradient(90deg,var(--teal),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.ref-tier-l{font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(232,244,255,.3)}
.ref-tier-r{font-size:.8rem;font-style:italic;color:rgba(232,244,255,.45);margin-top:6px}
.ref-link-row{display:flex;gap:10px;align-items:center;background:rgba(0,0,0,.4);border:1px solid rgba(0,245,212,.15);border-radius:12px;padding:14px 20px}
.ref-link-text{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--teal);flex:1;letter-spacing:1px}
.ref-copy-btn{padding:8px 20px;background:rgba(0,245,212,.12);border:1px solid rgba(0,245,212,.25);border-radius:8px;color:var(--teal);font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;white-space:nowrap}
.ref-copy-btn:hover{background:rgba(0,245,212,.2)}

/* TESTIMONIALS V2 */
.testi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;max-width:1000px;margin:0 auto}
.t-card{background:rgba(2,11,24,.65);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:28px;backdrop-filter:blur(8px);position:relative}
.t-edition{position:absolute;top:16px;right:16px;padding:3px 10px;border-radius:50px;font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:1px}
.t-stars{color:var(--gold);letter-spacing:4px;font-size:.8rem;margin-bottom:14px}
.t-text{font-size:.92rem;font-style:italic;color:rgba(232,244,255,.62);line-height:1.8;margin-bottom:18px}
.t-auth{display:flex;align-items:center;gap:10px}
.t-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.t-name{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(232,244,255,.45);text-transform:uppercase}
.t-role{font-size:.72rem;font-style:italic;color:rgba(232,244,255,.28)}

/* FOOTER */
.lfoot{position:relative;z-index:2;padding:80px 40px 48px;border-top:1px solid rgba(255,255,255,.04)}
.lf-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;max-width:1000px;margin:0 auto 56px}
.lf-brand{font-family:'Cinzel Decorative',serif;font-size:1.2rem;background:linear-gradient(90deg,var(--teal),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.lf-brand-sub{font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:4px;color:rgba(232,244,255,.22);text-transform:uppercase;margin-bottom:16px}
.lf-brand-desc{font-size:.85rem;font-style:italic;color:rgba(232,244,255,.35);line-height:1.7;max-width:260px}
.lf-col-title{font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:5px;text-transform:uppercase;color:rgba(232,244,255,.22);margin-bottom:16px}
.lf-col a{display:block;font-size:.82rem;font-style:italic;color:rgba(232,244,255,.3);text-decoration:none;margin-bottom:9px;cursor:pointer;transition:color .25s}
.lf-col a:hover{color:var(--teal)}
.lf-bottom{max-width:1000px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.lf-copy{font-family:'Space Mono',monospace;font-size:.55rem;color:rgba(232,244,255,.14);letter-spacing:1px}
.lf-badges{display:flex;gap:8px}
.lf-badge{padding:4px 10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:4px;font-family:'Space Mono',monospace;font-size:.5rem;color:rgba(232,244,255,.2);letter-spacing:1px}

/* DIVIDERS */
.dv{position:relative;z-index:2;height:90px;display:flex;align-items:center;justify-content:center}
.dv::before{content:'';position:absolute;inset-inline:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,245,212,.12),rgba(155,93,229,.12),transparent)}
.dv-sym{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:6px;color:rgba(232,244,255,.08);position:relative;padding:0 28px;background:var(--void)}

/* REVEAL */
.rv{opacity:0;transform:translateY(28px);transition:opacity .85s ease,transform .85s ease}
.rv.vis{opacity:1;transform:translateY(0)}

.ob-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:90px 20px 40px;position:relative;z-index:2}
.ob-wrap{max-width:560px;width:100%}

/* Step indicator */
.ob-steps{display:flex;align-items:center;gap:0;margin-bottom:40px;justify-content:center}
